name: artvaluator-env
description: AI-powered artwork valuation environment

observation_space:
  predicted_price: float
  true_price: float

action_space:
  predicted_price: float
  description: string

reward:
  type: continuous
  range: [0.0, 1.0]

tasks:
  - name: easy
    description: platform recommendation

  - name: medium
    description: description generation

  - name: hard
    description: price prediction

api:
  reset: supported
  step: supported
  state: supported